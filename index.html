<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دعواتي في الحج | روحانية ودعاء</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700;900&family=Cairo:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #1a5f5a;
        --primary-dark: #0e3b38;
        --secondary: #d4af37;
        --secondary-soft: #f3e5ab;
        --bg-light: #fefcf5;
        --bg-surface: #ffffff;
        --text-dark: #2c3e2f;
        --text-soft: #5a6e5c;
        --border-color: #e2dccd;
        --shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.1);
        --radius: 20px;
        --transition: all 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Cairo", sans-serif;
        background-color: var(--bg-light);
        color: var(--text-dark);
        position: relative;
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" opacity="0.03"><path fill="none" d="M400 0L482 118L618 118L546 236L618 354L482 354L400 472L318 354L182 354L254 236L182 118L318 118L400 0Z" stroke="%231a5f5a" stroke-width="2"/><path fill="none" d="M400 118L446 177L446 250L400 309L354 250L354 177L400 118Z" stroke="%231a5f5a" stroke-width="2"/><circle cx="400" cy="400" r="50" fill="none" stroke="%231a5f5a" stroke-width="1.5"/><circle cx="400" cy="400" r="80" fill="none" stroke="%231a5f5a" stroke-width="1"/></svg>');
        background-repeat: repeat;
        background-size: 120px;
        pointer-events: none;
        z-index: 0;
      }

      .page {
        display: none;
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding: 32px 24px;
      }

      .page.active {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .kaaba-icon {
        font-size: 80px;
        margin-bottom: 20px;
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
        animation: gentleFloat 4s ease-in-out infinite;
      }

      @keyframes gentleFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }

      h1 {
        font-family: "Amiri", serif;
        font-size: 48px;
        font-weight: 900;
        color: var(--primary);
        margin-bottom: 12px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
        letter-spacing: -0.5px;
      }

      .subtitle {
        font-size: 18px;
        color: var(--text-soft);
        margin-bottom: 48px;
        font-weight: 400;
        position: relative;
        padding-bottom: 12px;
      }

      .subtitle::after {
        content: "✦";
        font-size: 14px;
        color: var(--secondary);
        position: absolute;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-light);
        padding: 0 8px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px 28px;
        font-family: "Cairo", sans-serif;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
        box-shadow: var(--shadow);
        letter-spacing: 0.3px;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: #fff;
        box-shadow: 0 8px 20px rgba(26, 95, 90, 0.3);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 25px -8px rgba(26, 95, 90, 0.4);
        filter: brightness(1.05);
      }

      .btn-outline {
        background: transparent;
        color: var(--primary);
        border: 2px solid var(--primary);
        box-shadow: none;
      }

      .btn-outline:hover {
        background: var(--primary);
        color: #fff;
        transform: translateY(-2px);
      }

      .btn-secondary {
        background: linear-gradient(135deg, var(--secondary), #b8941e);
        color: #2c3e2f;
        box-shadow: 0 8px 20px rgba(212, 175, 55, 0.25);
      }

      .btn-sm {
        padding: 10px 20px;
        font-size: 14px;
      }

      .btn-success {
        background: linear-gradient(135deg, #2d6a4f, #1b4d3e);
        color: #fff;
      }

      .btn-icon {
        gap: 8px;
      }

      .form-card {
        background: var(--bg-surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 40px;
        width: 100%;
        max-width: 600px;
        border: 1px solid var(--border-color);
        backdrop-filter: blur(2px);
        transition: transform 0.3s ease;
      }

      .form-title {
        font-size: 28px;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 32px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-family: "Amiri", serif;
      }

      .form-title i {
        color: var(--secondary);
        font-size: 28px;
      }

      .field {
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--primary-dark);
        letter-spacing: 0.5px;
      }

      input[type="text"],
      input[type="password"],
      textarea {
        width: 100%;
        padding: 14px 18px;
        border: 2px solid var(--border-color);
        border-radius: 16px;
        background: var(--bg-light);
        font-family: "Cairo", sans-serif;
        font-size: 16px;
        color: var(--text-dark);
        outline: none;
        transition: var(--transition);
      }

      input:focus,
      textarea:focus {
        border-color: var(--secondary);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
      }

      .duaa-rows {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 20px;
        max-height: 400px;
        overflow-y: auto;
        padding-left: 4px;
      }

      .duaa-row {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        background: var(--bg-light);
        border-radius: 16px;
        padding: 16px;
        border: 1px solid var(--border-color);
        transition: var(--transition);
      }

      .duaa-row textarea {
        flex: 1;
        min-height: 90px;
        border-radius: 12px;
        font-size: 15px;
        background: #fff;
      }

      .btn-remove {
        background: transparent;
        border: 1px solid #e0c3c3;
        color: #b91c1c;
        width: 38px;
        height: 38px;
        border-radius: 12px;
        cursor: pointer;
        transition: var(--transition);
        flex-shrink: 0;
      }

      .btn-remove:hover {
        background: #fee2e2;
        border-color: #b91c1c;
        transform: scale(0.95);
      }

      .btn-add-row {
        background: transparent;
        border: 2px dashed var(--secondary);
        border-radius: 16px;
        padding: 12px;
        width: 100%;
        cursor: pointer;
        font-family: "Cairo", sans-serif;
        font-weight: 600;
        color: var(--secondary);
        transition: var(--transition);
      }

      .btn-add-row:hover {
        background: rgba(212, 175, 55, 0.1);
        border-style: solid;
      }

      .form-actions {
        display: flex;
        gap: 16px;
        margin-top: 32px;
        justify-content: flex-end;
      }

      .review-container {
        width: 100%;
        max-width: 800px;
      }

      .review-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
        flex-wrap: wrap;
        gap: 16px;
      }

      .review-header h2 {
        font-size: 32px;
        color: var(--primary);
        font-family: "Amiri", serif;
      }

      .stats-bar {
        display: flex;
        gap: 20px;
        margin-bottom: 32px;
        flex-wrap: wrap;
      }

      .stat-chip {
        background: var(--bg-surface);
        padding: 8px 20px;
        border-radius: 40px;
        font-size: 14px;
        font-weight: 600;
        color: var(--primary-dark);
        box-shadow: var(--shadow);
        border: 1px solid var(--border-color);
      }

      .person-card {
        background: var(--bg-surface);
        border-radius: 24px;
        box-shadow: var(--shadow);
        margin-bottom: 28px;
        overflow: hidden;
        transition: var(--transition);
        border: 1px solid var(--border-color);
      }

      .person-header {
        background: linear-gradient(95deg, var(--primary), #2a7a74);
        color: #fff;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 20px;
        font-weight: 700;
        font-family: "Amiri", serif;
      }

      .person-icon {
        font-size: 24px;
      }

      .duaa-list {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .duaa-item {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 16px;
        border-radius: 20px;
        background: var(--bg-light);
        transition: var(--transition);
        border-right: 4px solid var(--secondary);
      }

      .duaa-item.done {
        background: #f0f7f0;
        opacity: 0.75;
        border-right-color: var(--primary-dark);
      }

      .duaa-text {
        flex: 1;
        font-size: 16px;
        line-height: 1.6;
        color: var(--text-dark);
      }

      .duaa-item.done .duaa-text {
        text-decoration: line-through;
        color: #7e8c7f;
      }

      .check-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid var(--secondary);
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: var(--transition);
        color: transparent;
      }

      .check-btn:hover {
        background: var(--secondary-soft);
        transform: scale(1.05);
      }

      .check-btn.checked {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }

      .empty-state {
        text-align: center;
        padding: 64px 24px;
        background: var(--bg-surface);
        border-radius: 32px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border-color);
      }

      .empty-icon {
        font-size: 64px;
        margin-bottom: 20px;
        color: var(--secondary);
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: transparent;
        border: none;
        color: var(--primary);
        font-family: "Cairo", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 24px;
        transition: var(--transition);
        padding: 6px 12px;
        border-radius: 40px;
      }

      .back-btn:hover {
        background: rgba(26, 95, 90, 0.1);
        gap: 4px;
      }

      .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--primary-dark);
        color: #fff;
        padding: 14px 28px;
        border-radius: 60px;
        font-family: "Cairo", sans-serif;
        font-size: 15px;
        font-weight: 500;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        z-index: 9999;
        backdrop-filter: blur(8px);
        background: rgba(14, 59, 56, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
      }

      .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
        margin-left: 6px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 640px) {
        .page {
          padding: 20px 16px;
        }
        .form-card {
          padding: 24px;
        }
        h1 {
          font-size: 36px;
        }
        .kaaba-icon {
          font-size: 60px;
        }
        .review-header h2 {
          font-size: 26px;
        }
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--border-color);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--secondary);
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <!-- MAIN PAGES -->
    <div class="page active" id="page-home">
      <div class="kaaba-icon"><i class="fas fa-kaaba"></i></div>
      <h1>دعواتي في الحج</h1>
      <p class="subtitle">اجمعي دعوات أحبابك وحملها معكِ في رحلة الخير</p>
      <div
        class="home-actions"
        style="
          display: flex;
          flex-direction: column;
          gap: 16px;
          max-width: 320px;
          width: 100%;
        "
      >
        <button class="btn btn-primary btn-icon" onclick="goTo('page-add')">
          <i class="fas fa-feather-alt"></i> ✍️ أضف دعواتك
        </button>
        <button
          class="btn btn-outline btn-icon"
          onclick="goTo('page-password')"
        >
          <i class="fas fa-book-quran"></i> 📋 استعرض الدعوات
        </button>
      </div>
    </div>

    <div class="page" id="page-add">
      <div style="width: 100%; max-width: 600px">
        <button class="back-btn" onclick="goTo('page-home')">
          <i class="fas fa-arrow-right"></i> رجوع
        </button>
        <div class="form-card">
          <div class="form-title">
            <i class="fas fa-feather-alt"></i><span>أضف دعواتك</span>
          </div>
          <div class="field">
            <label><i class="fas fa-user"></i> اسمك</label>
            <input
              type="text"
              id="input-name"
              placeholder="مثال: أم أحمد أو محمد"
            />
          </div>
          <div class="field">
            <label><i class="fas fa-hands-praying"></i> الدعوات</label>
            <div class="duaa-rows" id="duaa-rows">
              <div class="duaa-row">
                <textarea
                  placeholder="اللهم ... اكتب دعوتك من القلب..."
                ></textarea>
                <button
                  class="btn-remove"
                  onclick="removeRow(this)"
                  title="حذف"
                >
                  <i class="fas fa-trash-alt"></i>
                </button>
              </div>
            </div>
            <button class="btn-add-row" onclick="addRow()">
              <i class="fas fa-plus-circle"></i> أضف دعوة أخرى
            </button>
          </div>
          <div class="form-actions">
            <button class="btn btn-outline btn-sm" onclick="goTo('page-home')">
              إلغاء
            </button>
            <button class="btn btn-success" onclick="submitDuaa()">
              <i class="fas fa-save"></i> حفظ الدعوات
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-password">
      <div style="width: 100%; max-width: 420px">
        <button class="back-btn" onclick="goTo('page-home')">
          <i class="fas fa-arrow-right"></i> رجوع
        </button>
        <div class="form-card">
          <div class="form-title">
            <i class="fas fa-lock"></i><span>الدخول للدعوات</span>
          </div>
          <div class="field">
            <label><i class="fas fa-key"></i> كلمة السر</label>
            <input
              type="password"
              id="input-password"
              placeholder="ادخلي كلمة المرور"
              onkeydown="if (event.key === 'Enter') verifyPassword();"
            />
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" onclick="verifyPassword()">
              دخول <i class="fas fa-sign-in-alt"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-review">
      <div class="review-container">
        <button class="back-btn" onclick="goTo('page-home')">
          <i class="fas fa-arrow-right"></i> رجوع
        </button>
        <div class="review-header">
          <h2><i class="fas fa-praying-hands"></i> دعوات الأحباب</h2>
          <div style="display: flex; gap: 12px">
            <button class="btn btn-outline btn-sm" onclick="uncheckAll()">
              <i class="fas fa-sync-alt"></i> إلغاء الكل
            </button>
            <button
              class="btn btn-primary btn-sm"
              id="saveProgressBtn"
              onclick="saveProgressToSheet()"
            >
              <i class="fas fa-cloud-upload-alt"></i> حفظ التقدم
            </button>
          </div>
        </div>
        <div class="stats-bar" id="stats-bar"></div>
        <div id="review-list"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const APPS_SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbxHj7JAogkdZEZwkQaUxcwQv-iliBSNaQLz6NznGGEGsSeeO6sre73BqCxxIyMXsRCu/exec";
      const DONE_KEY = "hajj_done_v1";
      let sessionPassword = "";
      let currentProgressState = {}; // الحالة المحلية الحالية (localStorage mirror)

      function loadDoneState() {
        try {
          return JSON.parse(localStorage.getItem(DONE_KEY)) || {};
        } catch {
          return {};
        }
      }
      function saveDoneState(state) {
        localStorage.setItem(DONE_KEY, JSON.stringify(state));
        currentProgressState = state;
      }

      function showToast(msg, isError = false) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.style.background = isError
          ? "rgba(185, 28, 28, 0.9)"
          : "rgba(14, 59, 56, 0.9)";
        t.classList.add("show");
        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => {
          t.classList.remove("show");
          t.style.background = "rgba(14, 59, 56, 0.9)";
        }, 2600);
      }

      function goTo(pageId) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(pageId).classList.add("active");
        if (pageId === "page-review") {
          loadProgressFromSheetAndRender();
        }
        if (pageId === "page-add") resetForm();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // === تحميل الحالة من الشيت (مرة واحدة عند الدخول) ===
      async function loadProgressFromSheetAndRender() {
        const listEl = document.getElementById("review-list");
        const statsBar = document.getElementById("stats-bar");
        listEl.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-spinner fa-pulse"></i></div><p>جاري تحميل الدعوات...</p></div>`;
        statsBar.innerHTML = "";

        if (!sessionPassword) {
          goTo("page-password");
          return;
        }

        try {
          // 1) جلب قائمة الدعوات
          const res = await fetch(
            APPS_SCRIPT_URL +
              "?password=" +
              encodeURIComponent(sessionPassword),
          );
          const json = await res.json();
          if (!json.success) throw new Error(json.error);
          let rows = json.data.filter(
            (r) => r.name && r.duaa && r.name !== "name",
          );

          // 2) جلب حالة التقدم المحفوظة في الشيت (إن وجدت)
          let remoteState = {};
          try {
            const progressRes = await fetch(APPS_SCRIPT_URL, {
              method: "POST",
              body: JSON.stringify({
                action: "getProgress",
                password: sessionPassword,
              }),
            });
            const progressJson = await progressRes.json();
            if (progressJson.success && progressJson.progress) {
              remoteState = progressJson.progress;
            }
          } catch (e) {
            console.warn("لا يمكن جلب التقدم من الشيت", e);
          }

          // دمج: نفضل الحالة البعيدة لأنها الأحدث (عبر الأجهزة)
          let mergedState = remoteState;
          // حفظ الحالة في localStorage وتحديث المتغير
          saveDoneState(mergedState);
          // عرض الدعوات مع هذه الحالة
          renderReviewWithData(rows, mergedState);
        } catch (err) {
          console.error(err);
          listEl.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-circle"></i></div><p>فشل التحميل، تأكدي من الاتصال أو كلمة السر</p></div>`;
        }
      }

      function renderReviewWithData(rows, doneState) {
        const listEl = document.getElementById("review-list");
        const statsBar = document.getElementById("stats-bar");

        if (!rows || rows.length === 0) {
          listEl.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-moon"></i></div><p>لا توجد دعوات حتى الآن — شاركي الرابط مع أحبابك 🤍</p></div>`;
          statsBar.innerHTML = "";
          return;
        }

        const grouped = {};
        rows.forEach((r, idx) => {
          if (!grouped[r.name]) grouped[r.name] = [];
          grouped[r.name].push({ text: r.duaa, rowIndex: idx });
        });

        const totalDuaas = rows.length;
        const doneDuaas = Object.values(doneState).filter(Boolean).length;
        statsBar.innerHTML = `
          <div class="stat-chip"><i class="fas fa-users"></i> ${Object.keys(grouped).length} شخص</div>
          <div class="stat-chip"><i class="fas fa-hands-praying"></i> ${totalDuaas} دعوة</div>
          <div class="stat-chip"><i class="fas fa-check-circle"></i> ${doneDuaas} تم الدعاء بها</div>
        `;

        listEl.innerHTML = Object.entries(grouped)
          .map(
            ([name, duas]) => `
          <div class="person-card">
            <div class="person-header"><i class="fas fa-user-check person-icon"></i><span>${escapeHtml(name)}</span></div>
            <div class="duaa-list">
              ${duas
                .map((d) => {
                  const key = `${name}__${d.rowIndex}`;
                  const done = !!doneState[key];
                  return `
                  <div class="duaa-item ${done ? "done" : ""}">
                    <span class="duaa-text">${escapeHtml(d.text)}</span>
                    <button class="check-btn ${done ? "checked" : ""}" onclick="toggleDoneLocal('${escapeHtml(name)}', ${d.rowIndex})">${done ? "✓" : ""}</button>
                  </div>
                `;
                })
                .join("")}
            </div>
          </div>
        `,
          )
          .join("");
      }

      // === التعديلات المحلية فقط (لا يتم إرسال أي شيء إلى الشيت) ===
      window.toggleDoneLocal = function (name, rowIndex) {
        const key = `${name}__${rowIndex}`;
        const state = loadDoneState();
        state[key] = !state[key];
        saveDoneState(state);
        // إعادة التصيير بناءً على البيانات المحفوظة محلياً
        refreshReviewFromLocal();
      };

      async function refreshReviewFromLocal() {
        if (!sessionPassword) return;
        try {
          const res = await fetch(
            APPS_SCRIPT_URL +
              "?password=" +
              encodeURIComponent(sessionPassword),
          );
          const json = await res.json();
          if (!json.success) throw new Error();
          let rows = json.data.filter(
            (r) => r.name && r.duaa && r.name !== "name",
          );
          const localState = loadDoneState();
          renderReviewWithData(rows, localState);
        } catch (e) {
          showToast("حدث خطأ أثناء تحديث القائمة", true);
        }
      }

      // === حفظ التقدم إلى الشيت (زر الحفظ) ===
      window.saveProgressToSheet = async function () {
        if (!sessionPassword) {
          showToast("الرجاء إدخال كلمة السر أولاً", true);
          return;
        }
        const btn = document.getElementById("saveProgressBtn");
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<span class="loading-spinner"></span> جاري الحفظ...';
        btn.disabled = true;

        try {
          const currentState = loadDoneState();
          const response = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
              action: "updateProgress",
              password: sessionPassword,
              progress: currentState,
            }),
          });
          const result = await response.json();
          if (result.success) {
            showToast("✓ تم حفظ تقدم الدعوات في السحاب");
          } else {
            throw new Error(result.error || "فشل الحفظ");
          }
        } catch (err) {
          console.error(err);
          showToast("❌ فشل حفظ التقدم، حاولي مجدداً", true);
        } finally {
          btn.innerHTML = originalHtml;
          btn.disabled = false;
        }
      };

      window.uncheckAll = function () {
        if (
          confirm(
            "هل تريدين إلغاء جميع علامات 'تم الدعاء' محلياً؟ سيؤثر ذلك على الجهاز الحالي فقط حتى تقومي بحفظ التقدم.",
          )
        ) {
          saveDoneState({});
          refreshReviewFromLocal();
          showToast(
            "تم إلغاء جميع العلامات المحلية، اضغطي 'حفظ التقدم' لتحديث السحاب",
          );
        }
      };

      // === باقي الدوال (verify, submit, addRow, removeRow, resetForm) ===
      async function verifyPassword() {
        const pw = document.getElementById("input-password").value.trim();
        if (!pw) {
          showToast("⚠️ ادخلي كلمة السر");
          return;
        }
        const btn = document.querySelector("#page-password .btn-primary");
        const originalText = btn.innerHTML;
        btn.innerHTML =
          '<i class="fas fa-spinner fa-pulse"></i> جاري التحقق...';
        btn.disabled = true;
        try {
          const res = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "verify", password: pw }),
          });
          const json = await res.json();
          if (json.success) {
            sessionPassword = pw;
            document.getElementById("input-password").value = "";
            goTo("page-review");
            showToast("✨ مرحباً بك في سجل الدعوات");
          } else {
            showToast("❌ كلمة السر غير صحيحة");
          }
        } catch (err) {
          showToast("⚠️ خطأ في الاتصال", true);
        } finally {
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      }

      function addRow() {
        const container = document.getElementById("duaa-rows");
        const div = document.createElement("div");
        div.className = "duaa-row";
        div.innerHTML = `<textarea placeholder="اللهم ... اكتب دعوتك من القلب..."></textarea><button class="btn-remove" onclick="removeRow(this)" title="حذف"><i class="fas fa-trash-alt"></i></button>`;
        container.appendChild(div);
        div.querySelector("textarea").focus();
      }
      function removeRow(btn) {
        const rows = document.querySelectorAll(".duaa-row");
        if (rows.length === 1) {
          showToast("لابد أن تبقى دعوة واحدة على الأقل 🌸");
          return;
        }
        btn.closest(".duaa-row").remove();
      }
      function resetForm() {
        document.getElementById("input-name").value = "";
        const container = document.getElementById("duaa-rows");
        container.innerHTML = `<div class="duaa-row"><textarea placeholder="اللهم ... اكتب دعوتك من القلب..."></textarea><button class="btn-remove" onclick="removeRow(this)" title="حذف"><i class="fas fa-trash-alt"></i></button></div>`;
      }
      async function submitDuaa() {
        const name = document.getElementById("input-name").value.trim();
        if (!name) {
          showToast("✍️ رجاءً اكتب اسمك قبل الحفظ");
          return;
        }
        const textareas = document.querySelectorAll("#duaa-rows textarea");
        const duaas = [...textareas].map((t) => t.value.trim()).filter(Boolean);
        if (duaas.length === 0) {
          showToast("🤲 اكتب دعوة واحدة على الأقل لتحفظها");
          return;
        }
        const btn = document.querySelector("#page-add .btn-success");
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الحفظ...';
        btn.disabled = true;
        try {
          const res = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "save", name, duaas }),
          });
          const json = await res.json();
          if (json.success) {
            showToast("✅ تم حفظ دعواتك — جزاكِ الله خيراً!");
            setTimeout(() => goTo("page-home"), 1300);
          } else {
            throw new Error(json.error);
          }
        } catch (err) {
          showToast("❌ تعذر الحفظ، تأكدي من اتصالك بالإنترنت", true);
        } finally {
          btn.innerHTML = originalHtml;
          btn.disabled = false;
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
